<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>AI 助手</title>
    <style>
        :root {
            --primary-color: #007AFF;
            --primary-hover: #0056b3;
            --bg-color: #f0f2f5;
            --chat-bg: #ffffff;
            --user-msg-bg: #007AFF;
            --user-msg-text: #ffffff;
            --ai-msg-bg: #ffffff;
            --ai-msg-text: #333333;
            --border-color: #e5e7eb;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            display: flex;
            flex-direction: column;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: var(--bg-color);
            color: #333;
            overflow: hidden;
        }

        /* Header Styles */
        .header {
            padding: 12px 20px;
            background: #fff;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: var(--shadow-sm);
            z-index: 10;
        }

        .left-buttons, .right-buttons {
            display: flex;
            gap: 10px;
        }

        .middle-select {
            flex: 1;
            display: flex;
            justify-content: center;
            max-width: 300px;
        }

        .header-button {
            padding: 8px 16px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            background: white;
            color: #555;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 14px;
            font-weight: 500;
        }

        .header-button:hover {
            background: #f9fafb;
            border-color: #d1d5db;
            color: #333;
        }

        .model-select {
            padding: 8px 12px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            outline: none;
            background: #fff;
            font-size: 14px;
            width: 100%;
            cursor: pointer;
        }

        .model-select:focus {
            border-color: var(--primary-color);
        }

        /* Chat Container */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            scroll-behavior: smooth;
        }

        .message {
            padding: 16px;
            border-radius: 12px;
            position: relative;
            max-width: 85%;
            line-height: 1.6;
            font-size: 15px;
            box-shadow: var(--shadow-sm);
        }

        .user-message {
            background: var(--user-msg-bg);
            color: var(--user-msg-text);
            margin-left: auto;
            border-bottom-right-radius: 4px;
            white-space: pre-wrap !important;
            word-break: break-word;
        }

        .ai-message {
            background: var(--ai-msg-bg);
            color: var(--ai-msg-text);
            margin-right: auto;
            border-bottom-left-radius: 4px;
        }

        /* Copy Button */
        .copy-button {
            position: absolute;
            top: 8px;
            right: 8px;
            padding: 4px 8px;
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.2s;
            font-size: 12px;
            color: #666;
        }

        .message:hover .copy-button {
            opacity: 1;
        }

        /* Code Block */
        .code-block {
            margin: 1em 0;
            background: #282c34;
            border-radius: 8px;
            overflow: hidden;
            font-family: 'Fira Code', Consolas, Monaco, 'Courier New', monospace;
        }

        .code-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            background: #21252b;
            color: #abb2bf;
            font-size: 12px;
        }

        .code-header button {
            background: transparent;
            border: 1px solid #4b5563;
            color: #abb2bf;
            padding: 2px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
            transition: all 0.2s;
        }

        .code-header button:hover {
            background: #3e4451;
            border-color: #6b7280;
        }

        .code-content {
            padding: 16px;
            overflow-x: auto;
            color: #abb2bf;
            font-size: 14px;
        }

        .code-content pre {
            margin: 0;
        }

        /* Input Area */
        .input-area {
            padding: 20px;
            background: #fff;
            border-top: 1px solid var(--border-color);
        }

        .input-container {
            position: relative;
            display: flex;
            gap: 12px;
            align-items: flex-end;
            background: #fff;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 10px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .input-container:focus-within {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 2px rgba(0, 122, 255, 0.1);
        }

        textarea {
            flex: 1;
            height: 72px;
            min-height: 24px;
            max-height: 200px;
            border: none;
            resize: none;
            font-size: 15px;
            line-height: 1.5;
            font-family: inherit;
            outline: none;
            padding: 0;
            background: transparent;
        }

        .action-button {
            padding: 8px;
            height: 36px;
            width: 36px;
            background: transparent;
            color: #666;
            border: 1px solid transparent;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .action-button:hover {
            background: #f3f4f6;
            color: #333;
        }

        .send-button {
            padding: 8px 20px;
            height: 36px;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: background 0.2s;
        }

        .send-button:hover {
            background: var(--primary-hover);
        }

        /* File Preview */
        .file-preview {
            position: absolute;
            bottom: 100%;
            left: 0;
            background: #f9fafb;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 8px 12px;
            margin-bottom: 8px;
            font-size: 12px;
            color: #374151;
            display: flex;
            align-items: center;
            gap: 8px;
            max-width: 100%;
            box-shadow: var(--shadow-sm);
        }

        .file-preview button {
            background: none;
            border: none;
            cursor: pointer;
            color: #9ca3af;
            font-size: 16px;
            padding: 0;
            line-height: 1;
        }

        .file-preview button:hover {
            color: #ef4444;
        }

        /* Settings Panel & Modals */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(2px);
            display: none;
            z-index: 999;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .overlay.show {
            display: block;
            opacity: 1;
        }

        .settings-panel, .modal-content {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.95);
            width: 500px;
            max-height: 85vh;
            background: white;
            padding: 24px;
            border-radius: 12px;
            box-shadow: var(--shadow-md);
            display: none;
            z-index: 1000;
            overflow-y: auto;
            transition: transform 0.3s, opacity 0.3s;
            opacity: 0;
        }

        .settings-panel.show, .modal-content.show {
            display: block;
            transform: translate(-50%, -50%) scale(1);
            opacity: 1;
        }
        
        .modal { display: none; }
        
        #addModelModal[style*="display: block"] .modal-content,
        #historyModal[style*="display: block"] .modal-content,
        #quickCommandModal[style*="display: block"] .modal-content {
            display: block;
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }

        h3 {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
            color: #1a1a1a;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
        }

        .settings-item {
            margin-bottom: 20px;
        }

        .settings-item label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 500;
            color: #4b5563;
        }

        .settings-item input, .settings-item select, .settings-item textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.2s;
            font-family: inherit;
        }

        .settings-item input:focus, .settings-item select:focus, .settings-item textarea:focus {
            border-color: var(--primary-color);
            outline: none;
        }

        .settings-buttons {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            margin-top: 24px;
            padding-top: 16px;
            border-top: 1px solid var(--border-color);
        }

        .settings-button {
            padding: 8px 16px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            background: white;
            color: #374151;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }

        .settings-button:hover {
            background: #f3f4f6;
            border-color: #d1d5db;
        }

        .settings-button.primary {
            background: var(--primary-color);
            color: white;
            border: none;
        }

        .settings-button.primary:hover {
            background: var(--primary-hover);
        }

        /* Prompts Panel */
        .prompts-panel {
            position: absolute;
            bottom: 90px;
            left: 20px;
            right: 20px;
            background: white;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            box-shadow: var(--shadow-md);
            padding: 16px;
            max-height: 300px;
            display: flex;
            flex-direction: column;
            z-index: 100;
        }

        /* Prompt Popup */
        .prompt-popup {
            position: absolute;
            bottom: 100%;
            left: 0;
            background: white;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            box-shadow: var(--shadow-md);
            margin-bottom: 8px;
            width: 300px;
            max-height: 400px;
            display: flex;
            flex-direction: column;
            z-index: 1000;
            overflow: hidden;
        }
        
        .prompt-search-container {
            padding: 8px;
            border-bottom: 1px solid var(--border-color);
        }

        #promptSearchInput {
            width: 100%;
            padding: 8px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            font-size: 14px;
        }

        .prompts-list {
            overflow-y: auto;
            max-height: 300px;
        }

        .prompt-item {
            padding: 10px 12px;
            border-bottom: 1px solid var(--border-color);
            cursor: pointer;
            transition: background 0.1s;
        }

        .prompt-item:hover, .prompt-item.selected {
            background: #eef2ff;
        }

        .prompt-item-title {
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 2px;
            color: #1f2937;
        }

        .prompt-item-preview {
            font-size: 12px;
            color: #6b7280;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* System Message */
        .system-message {
            background: #f3f4f6;
            border-left: 4px solid #6b7280;
            padding: 12px;
            font-size: 14px;
        }

        .system-message-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 4px;
            color: #4b5563;
            font-weight: 500;
        }
        
        .close-button {
            background: none;
            border: none;
            font-size: 16px;
            cursor: pointer;
            color: #9ca3af;
        }
        
        .close-button:hover {
            color: #4b5563;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        
        ::-webkit-scrollbar-thumb {
            background: #d1d5db;
            border-radius: 3px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: #9ca3af;
        }
        
        /* History Modal */
        .history-list {
            max-height: 60vh;
            overflow-y: auto;
        }
        
        .history-item {
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .history-item:hover {
            background: #f9fafb;
        }
        
        .history-item-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 4px;
            font-size: 12px;
            color: #6b7280;
        }
        
        .history-item-content {
            font-size: 14px;
            color: #374151;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        /* Markdown Content Styling */
        .ai-message p { margin-bottom: 1em; }
        .ai-message p:last-child { margin-bottom: 0; }
        .ai-message h1, .ai-message h2, .ai-message h3 { margin-top: 1.5em; margin-bottom: 0.5em; font-weight: 600; }
        .ai-message ul, .ai-message ol { margin-bottom: 1em; padding-left: 1.5em; }
        .ai-message li { margin-bottom: 0.5em; }
        .ai-message code { background: rgba(0,0,0,0.05); padding: 2px 4px; border-radius: 3px; font-family: monospace; }
        .ai-message pre code { background: transparent; padding: 0; }
        .ai-message a { color: var(--primary-color); text-decoration: none; }
        .ai-message a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="header">
        <div class="left-buttons">
            <button onclick="newChat()" class="header-button">新对话</button>
            <button onclick="showChatHistory()" class="header-button">历史记录</button>
        </div>
        <div class="middle-select">
            <select id="currentModel" class="model-select">
                <!-- 由JavaScript动态填充 -->
            </select>
        </div>
        <div class="right-buttons">
            <button onclick="saveChatToFile()" class="header-button">保存对话</button>
            <button onclick="toggleSettings()" class="header-button">设置</button>
        </div>
    </div>

    <div class="chat-container" id="chatContainer"></div>

    <div class="input-area">
        <div class="input-container" ondragover="handleDragOver(event)" ondrop="handleDrop(event)">
            <button onclick="handleFileUpload()" class="action-button" title="上传文件">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path></svg>
            </button>
            <textarea 
                id="promptInput" 
                placeholder="输入消息... (输入 @ 搜索提示词，Shift+Enter 换行)"
                onkeydown="handleKeyPress(event)"
                oninput="handleInput(event)"
            ></textarea>
            <button onclick="sendMessage()" class="send-button">发送</button>
            
            <div class="prompt-popup" id="promptPopup" style="display: none;">
                <div class="prompt-search-container">
                    <input 
                        type="text" 
                        id="promptSearchInput" 
                        placeholder="搜索提示词..."
                        onkeydown="handlePromptKeyPress(event)"
                        oninput="handlePromptSearch(event)"
                    >
                </div>
                <div class="prompts-list" id="promptSearchList"></div>
            </div>
            
            <!-- File Preview (dynamically added) -->
            <div id="filePreview" class="file-preview" style="display: none;">
                <span id="fileName">filename.txt</span>
                <button onclick="clearFile()">×</button>
            </div>
        </div>
    </div>

    <div class="overlay" id="overlay"></div>

    <div class="settings-panel" id="settingsPanel">
        <h3>设置</h3>
        
        <div class="settings-item">
            <label>默认模型</label>
            <select id="defaultModel"></select>
        </div>

        <div class="settings-item">
            <label>聊天记录保存路径</label>
            <div style="display: flex; gap: 10px;">
                <input type="text" id="savePath" readonly placeholder="请选择保存路径">
                <button onclick="selectSavePath()" class="settings-button">选择</button>
            </div>
        </div>

        <div class="settings-item">
            <label>提示词文件夹路径</label>
            <div style="display: flex; gap: 10px;">
                <input type="text" id="promptsPath" readonly placeholder="请选择提示词路径">
                <button onclick="selectPromptsPath()" class="settings-button">选择</button>
            </div>
        </div>

        <h3>API 密钥</h3>
        <div class="settings-item">
            <label>OpenRouter API Key</label>
            <input type="password" id="openrouterKey" placeholder="sk-...">
        </div>
        <div class="settings-item">
            <label>Gemini API Key</label>
            <input type="password" id="geminiKey" placeholder="AIza...">
        </div>
        <div class="settings-item">
            <label>Deepseek API Key</label>
            <input type="password" id="deepseekKey" placeholder="sk-...">
        </div>
        
        <h3>自定义模型</h3>
        <div id="modelList" style="margin-bottom: 10px;"></div>
        <button onclick="showAddModelModal()" class="settings-button" style="width: 100%;">+ 添加自定义模型</button>

        <h3>超级面板快捷指令</h3>
        <div id="quickCommandList" style="margin-bottom: 10px;"></div>
        <button onclick="showQuickCommandModal()" class="settings-button" style="width: 100%;">+ 添加快捷指令</button>

        <div class="settings-buttons">
            <button onclick="toggleSettings()" class="settings-button">取消</button>
            <button onclick="saveSettings()" class="settings-button primary">保存设置</button>
        </div>
    </div>

    <!-- Add Model Modal -->
    <div class="modal" id="addModelModal">
        <div class="overlay" style="display: block; z-index: 1050;" onclick="closeAddModelModal()"></div>
        <div class="modal-content show" style="z-index: 1051;">
            <h3>添加自定义模型</h3>
            <div class="settings-item">
                <label>模型标识 (ID)</label>
                <input type="text" id="modelValue" placeholder="例如: company/model-name">
            </div>
            <div class="settings-item">
                <label>显示名称</label>
                <input type="text" id="modelLabel" placeholder="例如: My Model">
            </div>
            <div class="settings-item">
                <label>API 提供商</label>
                <select id="modelProvider">
                    <option value="openrouter">OpenRouter</option>
                    <option value="gemini">Gemini</option>
                    <option value="deepseek">Deepseek</option>
                </select>
            </div>
            <div class="settings-buttons">
                <button onclick="closeAddModelModal()" class="settings-button">取消</button>
                <button onclick="addCustomModel()" class="settings-button primary">添加</button>
            </div>
        </div>
    </div>

    <!-- Add Quick Command Modal -->
    <div class="modal" id="quickCommandModal">
        <div class="overlay" style="display: block; z-index: 1050;" onclick="closeQuickCommandModal()"></div>
        <div class="modal-content show" style="z-index: 1051;">
            <h3>添加快捷指令</h3>
            <div class="settings-item">
                <label>指令名称</label>
                <input type="text" id="qcTitle" placeholder="例如: 翻译为中文">
            </div>
            <div class="settings-item">
                <label>使用模型</label>
                <select id="qcModel"></select>
            </div>
            <div class="settings-item">
                <label>预设提示词</label>
                <textarea id="qcPrompt" rows="4" placeholder="例如: 请将以下内容翻译为简体中文..."></textarea>
            </div>
            <div class="settings-buttons">
                <button onclick="closeQuickCommandModal()" class="settings-button">取消</button>
                <button onclick="addQuickCommand()" class="settings-button primary">添加</button>
            </div>
        </div>
    </div>

    <!-- History Modal -->
    <div class="modal" id="historyModal">
        <div class="overlay" style="display: block; z-index: 1050;" onclick="closeHistoryModal()"></div>
        <div class="modal-content show" style="z-index: 1051; width: 600px;">
            <h3>聊天历史</h3>
            <div class="history-list" id="historyList">
                <!-- 动态填充 -->
            </div>
            <div class="settings-buttons">
                <button onclick="closeHistoryModal()" class="settings-button">关闭</button>
            </div>
        </div>
    </div>

    <script>
        // 聊天历史数组
        let chatHistory = [];
        let selectedPromptIndex = -1;
        let promptsList = [];
        let lastAtPosition = -1;
        let currentFile = null; // 当前选择的文件

        // 初始化
        window.onload = async () => {
            await loadSettings();
            updateModelSelectors();
            // 聚焦输入框
            document.getElementById('promptInput').focus();
            
            // 检查是否有等待的快捷指令（从超级面板进入）
            if (window.pendingQuickCommand) {
                applyQuickCommand(window.pendingQuickCommand);
                window.pendingQuickCommand = null;
            }
        };
        
        /**
         * 将提示词内容插入为系统消息卡片
         * @param {string} content - 提示词文本内容
         */
        window.services.addSystemMessage = (content) => {
            const container = document.getElementById('chatContainer');
            const wrapper = document.createElement('div');
            wrapper.className = 'system-message';

            const header = document.createElement('div');
            header.className = 'system-message-header';
            const titleEl = document.createElement('span');
            titleEl.textContent = '系统消息';
            const closeBtn = document.createElement('button');
            closeBtn.className = 'close-button';
            closeBtn.textContent = '×';
            closeBtn.onclick = () => wrapper.remove();
            header.appendChild(titleEl);
            header.appendChild(closeBtn);

            const contentEl = document.createElement('div');
            contentEl.className = 'system-message-content';
            contentEl.textContent = content;

            wrapper.appendChild(header);
            wrapper.appendChild(contentEl);
            container.appendChild(wrapper);
            wrapper.scrollIntoView({ behavior: 'smooth' });
        };

        // 暴露给 preload.js 调用
        window.applyQuickCommand = (cmd) => {
            // 切换模型
            const modelSelect = document.getElementById('currentModel');
            modelSelect.value = cmd.modelValue;
            
            // 添加系统消息
            if (cmd.prompt) {
                window.services.addSystemMessage(cmd.prompt);
            }
            
            // 如果有待处理文本（如选中文本），填充到输入框
            if (window.pendingText) {
                const input = document.getElementById('promptInput');
                input.value = window.pendingText;
                window.pendingText = null;
                // 可选：自动发送
                // sendMessage();
            }
        };

        // 加载设置
        async function loadSettings() {
            const settings = window.services.getSettings();
            const models = window.services.getBuiltInModels();
            
            // 填充默认模型选择器
            const defaultModel = document.getElementById('defaultModel');
            defaultModel.innerHTML = '';
            
            // 添加内置模型
            models.forEach(model => {
                const option = document.createElement('option');
                option.value = model.value;
                option.text = `${model.label} (${model.provider})`;
                defaultModel.appendChild(option);
            });
            
            // 添加自定义模型
            if (settings.customModels) {
                settings.customModels.forEach(model => {
                    const option = document.createElement('option');
                    option.value = model.value;
                    option.text = `${model.label} (${model.provider})`;
                    defaultModel.appendChild(option);
                });
            }
            
            // 设置当前值
            defaultModel.value = settings.defaultModel || (models[0] ? models[0].value : '');
            
            // 填充其他设置
            document.getElementById('openrouterKey').value = settings.openrouterApiKey || '';
            document.getElementById('geminiKey').value = settings.geminiApiKey || '';
            document.getElementById('deepseekKey').value = settings.deepseekApiKey || '';
            document.getElementById('savePath').value = settings.savePath || '';
            document.getElementById('promptsPath').value = settings.promptsPath || '';
            
            // 更新UI
            updateModelList();
            updateQuickCommandList();
        }

        // 保存设置
        async function saveSettings() {
            const settings = window.services.getSettings();
            const newSettings = {
                ...settings,
                openrouterApiKey: document.getElementById('openrouterKey').value,
                geminiApiKey: document.getElementById('geminiKey').value,
                deepseekApiKey: document.getElementById('deepseekKey').value,
                savePath: document.getElementById('savePath').value,
                defaultModel: document.getElementById('defaultModel').value,
                promptsPath: document.getElementById('promptsPath').value,
            };

            if (window.services.saveSettings(newSettings)) {
                window.services.showNotification('设置已保存');
                toggleSettings();
                updateModelSelectors();
            } else {
                window.services.showNotification('保存设置失败');
            }
        }

        // 路径选择
        function selectSavePath() {
            const path = window.services.selectSavePath();
            if (path) {
                document.getElementById('savePath').value = path;
            }
        }

        function selectPromptsPath() {
            const path = window.services.selectPromptsPath();
            if (path) {
                document.getElementById('promptsPath').value = path;
            }
        }

        // 文件上传处理
        /**
         * 选择文件并加入为当前附件
         */
        function handleFileUpload() {
            const selected = window.services.selectFile();
            const filePath = Array.isArray(selected) ? selected[0] : selected;
            if (filePath) {
                try {
                    const fileData = window.services.readFile(filePath);
                    currentFile = fileData;
                    // 显示预览
                    const preview = document.getElementById('filePreview');
                    const fileName = document.getElementById('fileName');
                    fileName.textContent = fileData.name + (fileData.type === 'image' ? ' (图片)' : ' (文本)');
                    preview.style.display = 'flex';
                } catch (error) {
                    window.services.showNotification(error.message);
                }
            }
            // 选择完文件后自动恢复焦点到对话框
            restoreFocus();
        }

        /**
         * 清除当前附件并隐藏预览
         */
        function clearFile() {
            currentFile = null;
            document.getElementById('filePreview').style.display = 'none';
        }

        // 设置面板开关
        function toggleSettings() {
            const settingsPanel = document.getElementById('settingsPanel');
            const overlay = document.getElementById('overlay');
            
            if (settingsPanel.classList.contains('show')) {
                settingsPanel.classList.remove('show');
                overlay.classList.remove('show');
                setTimeout(() => {
                    settingsPanel.style.display = 'none';
                    overlay.style.display = 'none';
                }, 300);
            } else {
                settingsPanel.style.display = 'block';
                overlay.style.display = 'block';
                settingsPanel.offsetHeight; 
                settingsPanel.classList.add('show');
                overlay.classList.add('show');
                loadSettings();
            }
        }

        document.getElementById('overlay').onclick = function() {
            toggleSettings();
        };

        // 更新模型选择器
        function updateModelSelectors() {
            const settings = window.services.getSettings();
            const builtInModels = window.services.getBuiltInModels();
            const currentModelSelect = document.getElementById('currentModel');
            const qcModelSelect = document.getElementById('qcModel');
            
            const populate = (select) => {
                select.innerHTML = '';
                builtInModels.forEach(model => {
                    const option = document.createElement('option');
                    option.value = model.value;
                    option.text = `${model.label} (${model.provider})`;
                    option.dataset.provider = model.provider;
                    select.appendChild(option);
                });
                if (settings.customModels) {
                    settings.customModels.forEach(model => {
                        const option = document.createElement('option');
                        option.value = model.value;
                        option.text = `${model.label} (${model.provider})`;
                        option.dataset.isCustom = 'true';
                        option.dataset.provider = model.provider;
                        select.appendChild(option);
                    });
                }
            };

            populate(currentModelSelect);
            populate(qcModelSelect);
            
            // 选中默认
            const defaultVal = settings.defaultModel || (builtInModels[0] ? builtInModels[0].value : '');
            currentModelSelect.value = defaultVal;
        }

        // 自定义模型管理
        function updateModelList() {
            const modelList = document.getElementById('modelList');
            const settings = window.services.getSettings();
            modelList.innerHTML = '';
            if (settings.customModels) {
                settings.customModels.forEach((model, index) => {
                    const div = document.createElement('div');
                    div.className = 'model-item';
                    div.style.cssText = 'display:flex;justify-content:space-between;align-items:center;padding:8px;border:1px solid var(--border-color);border-radius:6px;margin-bottom:8px;background:#f9fafb;';
                    div.innerHTML = `
                        <span style="font-size: 14px;">${model.label} (${model.provider})</span>
                        <button onclick="removeModel(${index})" class="settings-button" style="padding: 4px 8px; font-size: 12px; color: #dc2626; border-color: #fca5a5;">删除</button>
                    `;
                    modelList.appendChild(div);
                });
            }
        }

        function showAddModelModal() {
            document.getElementById('addModelModal').style.display = 'block';
            document.getElementById('modelValue').value = '';
            document.getElementById('modelLabel').value = '';
        }

        function closeAddModelModal() {
            document.getElementById('addModelModal').style.display = 'none';
        }

        function addCustomModel() {
            const value = document.getElementById('modelValue').value.trim();
            const label = document.getElementById('modelLabel').value.trim();
            const provider = document.getElementById('modelProvider').value;

            if (!value || !label) {
                window.services.showNotification('请填写所有字段');
                return;
            }

            const settings = window.services.getSettings();
            if (!settings.customModels) settings.customModels = [];
            settings.customModels.push({ value, label, provider, isCustom: true });
            window.services.saveSettings(settings);
            updateModelList();
            updateModelSelectors();
            closeAddModelModal();
        }

        function removeModel(index) {
            const settings = window.services.getSettings();
            settings.customModels.splice(index, 1);
            window.services.saveSettings(settings);
            updateModelList();
            updateModelSelectors();
        }

        // 快捷指令管理
        function updateQuickCommandList() {
            const list = document.getElementById('quickCommandList');
            const settings = window.services.getSettings();
            list.innerHTML = '';
            if (settings.quickCommands) {
                settings.quickCommands.forEach((cmd, index) => {
                    const div = document.createElement('div');
                    div.style.cssText = 'display:flex;justify-content:space-between;align-items:center;padding:8px;border:1px solid var(--border-color);border-radius:6px;margin-bottom:8px;background:#f9fafb;';
                    div.innerHTML = `
                        <div style="display:flex;flex-direction:column;">
                            <span style="font-weight:500;font-size:14px;">${cmd.title}</span>
                            <span style="font-size:12px;color:#666;">${cmd.modelLabel}</span>
                        </div>
                        <button onclick="removeQuickCommand(${index})" class="settings-button" style="padding: 4px 8px; font-size: 12px; color: #dc2626; border-color: #fca5a5;">删除</button>
                    `;
                    list.appendChild(div);
                });
            }
        }

        function showQuickCommandModal() {
            document.getElementById('quickCommandModal').style.display = 'block';
            document.getElementById('qcTitle').value = '';
            document.getElementById('qcPrompt').value = '';
        }

        function closeQuickCommandModal() {
            document.getElementById('quickCommandModal').style.display = 'none';
        }

        function addQuickCommand() {
            const title = document.getElementById('qcTitle').value.trim();
            const prompt = document.getElementById('qcPrompt').value.trim();
            const modelSelect = document.getElementById('qcModel');
            const modelValue = modelSelect.value;
            const modelLabel = modelSelect.options[modelSelect.selectedIndex].text;
            const modelProvider = modelSelect.options[modelSelect.selectedIndex].dataset.provider;

            if (!title) {
                window.services.showNotification('请输入指令名称');
                return;
            }

            const settings = window.services.getSettings();
            if (!settings.quickCommands) settings.quickCommands = [];
            
            settings.quickCommands.push({
                title,
                prompt,
                modelValue,
                modelLabel,
                modelProvider
            });
            
            window.services.saveSettings(settings);
            updateQuickCommandList();
            closeQuickCommandModal();
        }

        function removeQuickCommand(index) {
            const settings = window.services.getSettings();
            settings.quickCommands.splice(index, 1);
            window.services.saveSettings(settings);
            updateQuickCommandList();
        }

        // 发送消息逻辑
        async function sendMessage() {
            const input = document.getElementById('promptInput');
            const message = input.value.trim();
            
            // 检查是否有消息或文件
            if (!message && !currentFile) return;

            // 收集系统消息
            const systemMessages = Array.from(document.getElementsByClassName('system-message'))
                .map(el => el.querySelector('.system-message-content').textContent);
            
            // 更新历史记录中的系统消息
            if (systemMessages.length > 0) {
                chatHistory = chatHistory.filter(msg => msg.role !== 'system');
                systemMessages.forEach(content => {
                    if (content && content.trim()) {
                        chatHistory.push({
                            role: 'system',
                            content: content.trim(),
                            timestamp: new Date()
                        });
                    }
                });
            }

            // 添加用户消息
            let displayContent = message;
            if (currentFile) {
                displayContent += `\n\n[附件: ${document.getElementById('fileName').textContent}]`;
            }
            addMessage(displayContent, true);
            
            // 清理输入和文件
            input.value = '';
            input.style.height = 'auto';
            const fileToSend = currentFile; // 保存当前文件引用用于发送
            clearFile();

            // 添加AI思考占位符
            const aiMessageDiv = document.createElement('div');
            aiMessageDiv.className = 'message ai-message';
            aiMessageDiv.innerHTML = '<span>正在思考...</span>';
            document.getElementById('chatContainer').appendChild(aiMessageDiv);
            aiMessageDiv.scrollIntoView({ behavior: 'smooth' });

            try {
                const modelSelect = document.getElementById('currentModel');
                const selectedOption = modelSelect.options[modelSelect.selectedIndex];
                
                const modelConfig = {
                    value: selectedOption.value,
                    provider: selectedOption.dataset.provider,
                    isCustom: selectedOption.dataset.isCustom === 'true'
                };

                const conversationHistory = chatHistory.filter(msg => 
                    ['user', 'assistant', 'system'].includes(msg.role)
                ).map(msg => ({ role: msg.role, content: msg.content }));

                // 发送请求，包含文件
                const responseStream = await window.services.callAPI(message, modelConfig, conversationHistory, fileToSend);
                
                let responseBuffer = '';
                const reader = responseStream.getReader();

                while (true) {
                    const {done, value} = await reader.read();
                    if (done) break;
                    responseBuffer += value;
                    aiMessageDiv.innerHTML = formatResponse(responseBuffer);
                    const container = document.getElementById('chatContainer');
                    if (container.scrollHeight - container.scrollTop - container.clientHeight < 100) {
                         aiMessageDiv.scrollIntoView({ behavior: 'smooth' });
                    }
                }

                // 记录助手消息
                chatHistory.push({
                    role: 'assistant',
                    content: responseBuffer,
                    timestamp: new Date()
                });
                
                addCopyButton(aiMessageDiv, responseBuffer);

            } catch (error) {
                console.error(error);
                aiMessageDiv.innerHTML = `<span style="color: #dc2626;">请求失败: ${error.message}</span>`;
            }
        }

        function addMessage(content, isUser) {
            const message = {
                role: isUser ? 'user' : 'assistant',
                content: content,
                timestamp: new Date()
            };
            chatHistory.push(message);

            const div = document.createElement('div');
            div.className = `message ${isUser ? 'user-message' : 'ai-message'}`;
            
            if (isUser) {
                div.textContent = content;
            } else {
                div.innerHTML = formatResponse(content);
            }
            
            if (!isUser) addCopyButton(div, content);
            
            document.getElementById('chatContainer').appendChild(div);
            div.scrollIntoView({ behavior: 'smooth' });
        }

        function addCopyButton(container, text) {
            const button = document.createElement('button');
            button.className = 'copy-button';
            button.textContent = '复制';
            button.onclick = () => window.services.copyToClipboard(text);
            container.appendChild(button);
        }

        // 输入框处理
        function handleKeyPress(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
            setTimeout(() => {
                const textarea = event.target;
                textarea.style.height = 'auto';
                textarea.style.height = textarea.scrollHeight + 'px';
            }, 0);
        }
        
        /**
         * 输入框内容变化时的处理（@ 搜索提示词、# 添加附件、自动高度）
         * @param {KeyboardEvent} event
         */
        function handleInput(event) {
            const textarea = event.target;
            const text = textarea.value;
            const caretPosition = textarea.selectionStart;
            textarea.style.height = 'auto';
            textarea.style.height = textarea.scrollHeight + 'px';

            if (text[caretPosition - 1] === '@') {
                lastAtPosition = caretPosition - 1;
                showPromptPopup();
            } else if (document.getElementById('promptPopup').style.display === 'block') {
                const searchText = text.slice(lastAtPosition + 1, caretPosition);
                const searchInput = document.getElementById('promptSearchInput');
                searchInput.value = searchText;
                handlePromptSearch({ target: searchInput });
            }

            // 使用 # 触发添加附件
            if (text[caretPosition - 1] === '#') {
                handleFileUpload();
            }
        }

        // 提示词搜索相关
        function showPromptPopup() {
            const popup = document.getElementById('promptPopup');
            popup.style.display = 'flex';
            const searchInput = document.getElementById('promptSearchInput');
            searchInput.value = '';
            searchInput.focus();
            handlePromptSearch({ target: searchInput });
        }

        function hidePromptPopup() {
            document.getElementById('promptPopup').style.display = 'none';
            lastAtPosition = -1;
            selectedPromptIndex = -1;
            document.getElementById('promptInput').focus();
        }

        async function handlePromptSearch(event) {
            const searchText = event.target.value;
            const results = await window.services.searchPrompts(searchText);
            promptsList = results;
            displayPrompts(results);
        }

        function displayPrompts(prompts) {
            const list = document.getElementById('promptSearchList');
            list.innerHTML = '';
            
            if (!prompts || prompts.length === 0) {
                list.innerHTML = '<div class="prompt-item"><div class="prompt-item-title">无匹配结果</div></div>';
                return;
            }
            
            prompts.forEach((prompt, index) => {
                const div = document.createElement('div');
                div.className = 'prompt-item' + (index === selectedPromptIndex ? ' selected' : '');
                div.innerHTML = `
                    <div class="prompt-item-title">${prompt.title}</div>
                    <div class="prompt-item-preview">${prompt.preview}</div>
                `;
                div.onclick = () => selectPrompt(prompt);
                list.appendChild(div);
            });
        }

        /**
         * 选择某个提示词并插入为系统消息
         * @param {{title:string, preview:string, content:string}} prompt
         */
        function selectPrompt(prompt) {
            window.services.addSystemMessage(prompt.content);
            if (lastAtPosition !== -1) {
                const textarea = document.getElementById('promptInput');
                const currentText = textarea.value;
                const caretPosition = textarea.selectionStart;
                textarea.value = currentText.substring(0, lastAtPosition) + currentText.substring(caretPosition);
            }
            hidePromptPopup();
        }

        /**
         * 提示词搜索输入框的键盘处理（上下选择、Enter 插入、Esc 关闭）
         * @param {KeyboardEvent} event
         */
        function handlePromptKeyPress(event) {
            const items = document.querySelectorAll('.prompt-item');
            if (event.key === 'ArrowDown') {
                event.preventDefault();
                selectedPromptIndex = Math.min(selectedPromptIndex + 1, items.length - 1);
                updatePromptSelection();
            } else if (event.key === 'ArrowUp') {
                event.preventDefault();
                selectedPromptIndex = Math.max(selectedPromptIndex - 1, 0);
                updatePromptSelection();
            } else if (event.key === 'Enter') {
                event.preventDefault();
                if (selectedPromptIndex < 0 && promptsList.length > 0) {
                    selectPrompt(promptsList[0]);
                } else if (selectedPromptIndex >= 0 && promptsList[selectedPromptIndex]) {
                    selectPrompt(promptsList[selectedPromptIndex]);
                }
            } else if (event.key === 'Escape') {
                hidePromptPopup();
            }
        }

        function updatePromptSelection() {
            const items = document.querySelectorAll('.prompt-item');
            items.forEach((item, index) => {
                item.classList.toggle('selected', index === selectedPromptIndex);
                if (index === selectedPromptIndex) item.scrollIntoView({ block: 'nearest' });
            });
        }

        // 格式化响应
        function formatResponse(text) {
            text = text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
            text = text.replace(/```(\w*)([\s\S]*?)```/g, (match, lang, code) => {
                return `<div class="code-block">
                    <div class="code-header">
                        <span>${lang || 'code'}</span>
                        <button onclick="window.services.copyToClipboard(this.parentElement.nextElementSibling.innerText)">复制</button>
                    </div>
                    <div class="code-content"><pre>${code.trim()}</pre></div>
                </div>`;
            });
            text = text.replace(/`([^`]+)`/g, '<code>$1</code>');
            text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
            text = text.replace(/^### (.*$)/gm, '<h3>$1</h3>');
            text = text.replace(/^## (.*$)/gm, '<h2>$1</h2>');
            text = text.replace(/^# (.*$)/gm, '<h1>$1</h1>');
            text = text.replace(/^\s*[\-\*]\s+(.*$)/gm, '<li>$1</li>');
            text = text.replace(/\n/g, '<br>');
            return text;
        }
        
        function newChat() {
            chatHistory = [];
            document.getElementById('chatContainer').innerHTML = '';
            clearFile();
        }

        /**
         * 恢复到插件主界面并聚焦输入框
         */
        function restoreFocus() {
            try {
                if (window.utools && typeof window.utools.showMainWindow === 'function') {
                    window.utools.showMainWindow();
                }
            } catch (e) {}
            const input = document.getElementById('promptInput');
            if (input) {
                input.focus();
                // 可选：将光标移到末尾
                const len = input.value.length;
                input.selectionStart = input.selectionEnd = len;
            }
        }

        /**
         * 拖拽覆盖事件处理，允许拖拽文件进入输入容器
         * @param {DragEvent} event
         */
        function handleDragOver(event) {
            event.preventDefault();
            event.dataTransfer.dropEffect = 'copy';
        }

        /**
         * 拖拽放下事件处理，将拖入的文件加入附件并预览
         * @param {DragEvent} event
         */
        function handleDrop(event) {
            event.preventDefault();
            const files = event.dataTransfer && event.dataTransfer.files;
            if (!files || files.length === 0) return;
            const fileObj = files[0];
            const filePath = fileObj.path || fileObj.name; // Electron 提供 path；浏览器仅有 name
            if (!filePath) return;
            try {
                const fileData = window.services.readFile(fileObj.path || filePath);
                currentFile = fileData;
                const preview = document.getElementById('filePreview');
                const fileName = document.getElementById('fileName');
                fileName.textContent = fileData.name + (fileData.type === 'image' ? ' (图片)' : ' (文本)');
                preview.style.display = 'flex';
            } catch (error) {
                window.services.showNotification(error.message);
            }
            restoreFocus();
        }
        
        async function showChatHistory() {
            const modal = document.getElementById('historyModal');
            const list = document.getElementById('historyList');
            list.innerHTML = '<div style="padding:20px;text-align:center;">加载中...</div>';
            modal.style.display = 'block';
            try {
                const files = await window.services.getChatHistory();
                list.innerHTML = '';
                if (files.length === 0) {
                    list.innerHTML = '<div style="padding:20px;text-align:center;color:#666;">暂无历史记录</div>';
                    return;
                }
                files.forEach(file => {
                    const div = document.createElement('div');
                    div.className = 'history-item';
                    div.innerHTML = `
                        <div class="history-item-header">
                            <span>${file.date}</span>
                            <span>${file.name}</span>
                        </div>
                        <div class="history-item-content">${file.preview}</div>
                    `;
                    div.onclick = () => loadChatHistory(file.path);
                    list.appendChild(div);
                });
            } catch (e) {
                list.innerHTML = '<div style="padding:20px;text-align:center;color:red;">加载失败</div>';
            }
        }
        
        function closeHistoryModal() {
            document.getElementById('historyModal').style.display = 'none';
        }
        
        async function loadChatHistory(path) {
            try {
                const content = await window.services.loadChatFile(path);
                newChat();
                const parts = content.split('---');
                parts.forEach(part => {
                    const match = part.match(/### (.*?) \((.*?)\)\s+([\s\S]*)/);
                    if (match) {
                        const roleStr = match[1];
                        const content = match[3].trim();
                        addMessage(content, roleStr === '用户');
                    }
                });
                closeHistoryModal();
            } catch (e) {
                window.services.showNotification('加载失败: ' + e.message);
            }
        }
        
        async function saveChatToFile() {
            if (chatHistory.length === 0) {
                window.services.showNotification('没有内容可保存');
                return;
            }
            const content = chatHistory.map(msg => {
                const roleName = msg.role === 'user' ? '用户' : (msg.role === 'assistant' ? 'AI' : '系统');
                return `### ${roleName} (${msg.timestamp.toLocaleString()})\n\n${msg.content}\n\n---\n`;
            }).join('\n');
            await window.services.saveChatHistory(content);
        }
    </script>
